server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve the built assets, fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the dashboard API on the compose network.
    # The UI uses a relative '/api' base (see src/lib/api.ts) so the browser
    # only ever talks to this single origin — no hardcoded host, no CORS.
    # Note: no trailing slash on proxy_pass, so the '/api' prefix the dashboard
    # routes expect (e.g. /api/logs) is preserved.
    location /api/ {
        proxy_pass http://dashboard-api:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Export (JSONL download) can be large; don't buffer the whole body.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
